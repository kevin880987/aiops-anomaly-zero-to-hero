name: Validate course

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON labs and dashboards
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = list(Path("labs").rglob("*.ipynb"))
          paths += list(Path("data").rglob("*.ipynb"))
          paths += list(Path("infra/grafana/dashboards").glob("*.json"))
          for path in paths:
              json.loads(path.read_text(encoding="utf-8"))
              print(f"ok {path}")
          PY

      - name: Validate course files
        run: |
          python -m py_compile infra/rrd_exporter.py
          python - <<'PY'
          import json
          from pathlib import Path

          legacy_terms = [
              "labs/getting-started/" + "scripts/",
              "bootstrap_" + "macos.sh",
              "bootstrap_" + "windows.ps1",
              "validate_" + "setup.py",
              "05-readiness-" + "check.md",
          ]
          scan_suffixes = {".md", ".py", ".yml", ".yaml", ".ipynb"}
          bad = []
          for path in Path(".").rglob("*"):
              if ".git" in path.parts or "outputs" in path.parts:
                  continue
              if path.is_file() and path.suffix in scan_suffixes:
                  text = path.read_text(encoding="utf-8")
                  for term in legacy_terms:
                      if term in text:
                          bad.append(f"{path}: stale reference to {term}")
          if bad:
              raise SystemExit("\n".join(bad))

          for path in Path("labs").rglob("*.ipynb"):
              nb = json.loads(path.read_text(encoding="utf-8"))
              ids = [cell.get("id") for cell in nb.get("cells", [])]
              if len(ids) != len(set(ids)):
                  raise SystemExit(f"duplicate notebook cell id in {path}")
              for idx, cell in enumerate(nb.get("cells", [])):
                  if cell.get("cell_type") == "code":
                      compile("".join(cell.get("source", [])), f"{path}:cell{idx}", "exec")
              print(f"ok notebook code {path}")
          PY
