# macOS course environment.
# Use this when the macOS bootstrap script is available or when you want platform-explicit setup.
name: aiops-anomaly-zero-to-hero
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - numpy>=1.26,<3
  - pandas>=2.0,<4
  - scipy>=1.12,<2
  - scikit-learn>=1.4,<2
  - matplotlib>=3.9
  - jupyterlab>=4.3
  - nbconvert>=7.16
  - ipykernel>=6.29
  - requests>=2.31
  - pyyaml>=6.0
  - pytest>=8.0
  - pytest-cov>=5.0
  - appnope>=0.1
  - prometheus_client>=0.20
  - pip:
      - anthropic>=0.40
