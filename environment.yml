name: aiops-anomaly-zero-to-hero
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  # Core dependencies
  - numpy>=1.26
  - pandas>=2.0
  - scikit-learn>=1.4
  - scipy>=1.12
  # Course / notebook
  - matplotlib>=3.9
  - jupyterlab>=4.3
  - ipykernel>=6.29
  # Dev / testing
  - pytest>=8.0
  - pytest-cov
  - pip:
      # Not on conda-forge with exact version constraints; install via pip.
      - prometheus_client>=0.20
      # Optional — required only for LLM-assisted RCA (labs/self-study/07, labs/workshop/08).
      # Install manually: pip install anthropic
      # anthropic>=0.40
