# macOS — use this file when starting Prometheus on macOS.
# Linux:   use prometheus.linux.yml (identical scrape targets).
# Windows: use prometheus.windows.yml (windows_exporter on :9182).
#
# Both scrape targets run simultaneously; Prometheus tolerates DOWN targets silently.
#   csv-exporter  :8000 — self-study path: synthetic RRD data via infra/csv_exporter.py
#   node-exporter :9100 — workshop path:   real PC network interface metrics
#
# Grafana Cloud remote_write (optional): see labs/getting-started/03b-setup-grafana-cloud.md

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alerts.yml"

# remote_write:                                    # optional — Grafana Cloud only
#   - url: https://<YOUR_ORG>.grafana.net/api/prom/push
#     basic_auth:
#       username: <YOUR_USER_ID>
#       password: <YOUR_API_TOKEN>

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "csv-exporter"       # self-study: infra/csv_exporter.py
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:8000"]

  - job_name: "node-exporter"      # workshop: node_exporter binary
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9100"]
