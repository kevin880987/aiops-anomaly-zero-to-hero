global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "csv-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:8000"]

  - job_name: "windows-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9182"]
