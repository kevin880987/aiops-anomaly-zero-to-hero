# Windows — use this file when starting Prometheus on Windows.
# macOS:  use prometheus.macos.yml (node_exporter on :9100).
# Linux:  use prometheus.linux.yml (node_exporter on :9100).
#
# Scrape jobs run simultaneously; Prometheus tolerates DOWN targets silently.
#   rrd-exporter     :8000 — self-study path: synthetic RRD data via infra/rrd_exporter.py
#   windows-exporter :9182 — workshop path:   real PC network interface metrics
#
# Grafana Cloud remote_write (optional): see labs/getting-started/03b-setup-grafana-cloud.md

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alerts.yml"

# remote_write:                                    # optional — Grafana Cloud only
#   - url: https://<YOUR_ORG>.grafana.net/api/prom/push
#     basic_auth:
#       username: <YOUR_USER_ID>
#       password: <YOUR_API_TOKEN>

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "rrd-exporter"       # self-study: infra/rrd_exporter.py
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:8000"]

  - job_name: "windows-exporter"   # workshop: windows_exporter binary
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9182"]

  - job_name: "python-results-exporter"  # optional: infra/python_results_exporter.py
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:8010"]
